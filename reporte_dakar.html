<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Ventas — Multiservicios Dakar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0F1117;
    --bg2:      #181C26;
    --bg3:      #1E2333;
    --border:   rgba(255,255,255,0.07);
    --text:     #E8EAF0;
    --muted:    #7A7F94;
    --mayor:    #3B82F6;
    --detal:    #10B981;
    --taller:   #F59E0B;
    --autoparts:#8B5CF6;
    --danger:   #EF4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; }

  /* ── Layout ── */
  .shell { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* ── Header ── */
  .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .page-title { font-size: 22px; font-weight: 600; letter-spacing: -.3px; }
  .page-sub { font-size: 12px; color: var(--muted); margin-top: 3px; font-family: 'DM Mono', monospace; }
  .last-update { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; text-align: right; }

  /* ── Loading ── */
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--mayor); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--muted); font-size: 13px; }
  #error { display: none; text-align: center; padding: 4rem 2rem; color: var(--danger); }

  /* ── Metrics ── */
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin-bottom: 2rem; }
  .metric { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.1rem; }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .metric-value { font-size: 20px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .metric-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* ── Section ── */
  .sec-title { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin: 1.75rem 0 .75rem; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }

  /* ── Cat header ── */
  .cat-header { display: flex; align-items: center; gap: 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: .75rem 1.1rem; margin-bottom: 1rem; }
  .cat-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .cat-name { font-size: 15px; font-weight: 600; }
  .cat-pct { font-size: 12px; color: var(--muted); margin-left: auto; font-family: 'DM Mono', monospace; }

  /* ── Highlights ── */
  .highlight { display: flex; gap: 8px; align-items: flex-start; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: .6rem .9rem; margin-bottom: 6px; }
  .hl-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .hl-text { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .hl-text strong { color: var(--text); font-weight: 500; }

  /* ── Charts ── */
  .chart-wrap { position: relative; width: 100%; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }

  /* ── Semana ── */
  .sem-header { display: flex; align-items: baseline; gap: 10px; padding: .5rem 0; border-bottom: 1px solid var(--border); margin: 1rem 0 .5rem; }
  .sem-label { font-size: 13px; font-weight: 600; }
  .sem-rango { font-size: 12px; color: var(--muted); }
  .sem-tot { margin-left: auto; font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; }

  /* ── Legend ── */
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .legend span { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-sq { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  /* ── Footer note ── */
  .note { font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 2.5rem; font-family: 'DM Mono', monospace; }

  /* ── Tabs ── */
  .tab-bar { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .tab { font-size: 12px; font-weight: 500; padding: 7px 16px; border: none; background: none; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  @media (max-width: 600px) {
    .two-col { grid-template-columns: 1fr; }
    .metric-grid { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>
<div class="shell">

  <div class="page-header">
    <div>
      <div class="page-title">Reporte de Ventas</div>
      <div class="page-sub">Multiservicios Dakar C.A.</div>
    </div>
    <div class="last-update" id="lastUpdate">Cargando...</div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Leyendo datos desde Google Sheets...</p>
  </div>
  <div id="error">No se pudo cargar el reporte. Verifica que el Google Sheet esté publicado correctamente.</div>
  <div id="app" style="display:none;"></div>

</div>

<script>
// ── Config ────────────────────────────────────────────────────
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTviotp9xDd9eB-4YVMbNKL-ERVbaB95dyTIptF1QsNzRYLksncPkoXn7o-1Lt2qfCQJJeKSF_hDBxU/pub?gid=1852453384&single=true&output=csv';

const CAT_COLORS = {
  Mayor:     { main:'#3B82F6', shades:['#1D4ED8','#2563EB','#3B82F6','#60A5FA','#93C5FD','#BFDBFE','#1E3A5F','#14284A','#0C1829','#2D5A8C','#1A3A5C','#0F2442','#4B9CD3','#6AADE0'] },
  Detal:     { main:'#10B981', shades:['#065F46','#047857','#059669','#10B981','#34D399','#6EE7B7','#A7F3D0','#D1FAE5','#0C4A35'] },
  Taller:    { main:'#F59E0B', shades:['#92400E','#F59E0B'] },
  AutoParts: { main:'#8B5CF6', shades:['#5B21B6','#7C3AED','#8B5CF6'] },
};

const fmt  = v => '$' + Math.round(v).toLocaleString('es-VE');
const fmtD = v => '$' + (+v).toLocaleString('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK = v => v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1000?'$'+Math.round(v/1000)+'K':'$'+Math.round(v);
const diasEs = {'Mon':'Lun','Tue':'Mar','Wed':'Mié','Thu':'Jue','Fri':'Vie','Sat':'Sáb','Sun':'Dom'};
const makeLabel = f => { const dt=new Date(f+'T12:00:00'); return (diasEs[dt.toLocaleDateString('en-US',{weekday:'short'}).slice(0,3)]||'?')+' '+dt.getDate(); };

let chartId = 0;
const nid = () => 'c'+(++chartId);

// ── Parse CSV ─────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).map(line => {
    // handle quoted fields
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = cols[i] || '');
    return obj;
  }).filter(r => r.ARTICULO && r.ARTICULO !== 'ARTICULO');
}

// ── Aggregate ─────────────────────────────────────────────────
function aggregate(rows) {
  const cats = ['Mayor','Detal','Taller','AutoParts'];
  const excl = ['Excluido','Otro'];
  const result = {};

  cats.forEach(cat => {
    const data = rows.filter(r => r.CATEGORIA === cat);
    const total = data.reduce((s,r) => s + (+r.NETO||0), 0);
    const facturas = new Set(data.map(r=>r.FACTURA)).size;
    const clientes = new Set(data.map(r=>r.CLIENTE)).size;
    const ticket = facturas ? total/facturas : 0;

    // por vendedor
    const byVend = {};
    data.forEach(r => { byVend[r.NOMBRE] = (byVend[r.NOMBRE]||0) + (+r.NETO||0); });
    const vendedores = Object.entries(byVend).sort((a,b)=>b[1]-a[1]);

    // evolución diaria
    const byDay = {};
    data.forEach(r => { if(r.FECHA) byDay[r.FECHA] = (byDay[r.FECHA]||0) + (+r.NETO||0); });

    // semanas ISO
    const bySem = {};
    data.forEach(r => {
      if (!r.FECHA) return;
      const dt = new Date(r.FECHA+'T12:00:00');
      const isoWeek = getISOWeek(dt);
      if (!bySem[isoWeek]) bySem[isoWeek] = { dias: {} };
      const f = r.FECHA;
      if (!bySem[isoWeek].dias[f]) bySem[isoWeek].dias[f] = {};
      bySem[isoWeek].dias[f][r.NOMBRE] = (bySem[isoWeek].dias[f][r.NOMBRE]||0) + (+r.NETO||0);
    });

    // mejor día
    const sorted = Object.entries(byDay).sort((a,b)=>b[1]-a[1]);
    const mejorDia = sorted[0] ? sorted[0][0] : '';
    const mejorDiaVal = sorted[0] ? sorted[0][1] : 0;
    const diasActivos = Object.keys(byDay).length;

    result[cat] = { total, facturas, clientes, ticket, vendedores, byDay, bySem, mejorDia, mejorDiaVal, diasActivos, rows: data };
  });

  // excluidos
  const exclRows = rows.filter(r => excl.includes(r.CATEGORIA));
  result._excluidos = {
    gerencia: exclRows.filter(r=>r.NOMBRE==='Gerencia').reduce((s,r)=>s+(+r.NETO||0),0),
    otros:    exclRows.filter(r=>r.NOMBRE!=='Gerencia').reduce((s,r)=>s+(+r.NETO||0),0),
  };

  return result;
}

function getISOWeek(dt) {
  const d = new Date(dt);
  d.setHours(12,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay()||7));
  const yearStart = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-yearStart)/86400000)+1)/7);
}

function semRango(isoWeek, year) {
  // Lunes de esa semana
  const simple = new Date(year, 0, 1 + (isoWeek-1)*7);
  const day = simple.getDay();
  const lunes = new Date(simple);
  lunes.setDate(simple.getDate() - (day===0?6:day-1));
  const domingo = new Date(lunes); domingo.setDate(lunes.getDate()+6);
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const f = d => `${d.getDate()} ${meses[d.getMonth()]}`;
  return `${f(lunes)} – ${f(domingo)}`;
}

// ── Plugin: etiquetas barras horizontales ─────────────────────
const hBarLabelPlugin = {
  id:'hBarLabel',
  afterDatasetsDraw(chart) {
    if (!chart.config.options._hbar) return;
    const {ctx, data} = chart;
    const total = data.datasets[0].data.reduce((a,b)=>a+b,0);
    const meta  = chart.getDatasetMeta(0);
    ctx.save();
    ctx.font = '500 10.5px "DM Mono", monospace';
    ctx.fillStyle = 'rgba(122,127,148,0.9)';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    meta.data.forEach((bar,i) => {
      const val = data.datasets[0].data[i];
      const pct = (val/total*100).toFixed(1);
      ctx.fillText(`${fmt(val)}  ${pct}%`, bar.x+8, bar.y);
    });
    ctx.restore();
  }
};

// ── Plugin: % en barras apiladas ──────────────────────────────
const stackPctPlugin = {
  id:'stackPct',
  afterDatasetsDraw(chart) {
    if (!chart.config.options._stacked) return;
    const {ctx} = chart;
    const totales = chart.config.options._totales;
    ctx.save();
    ctx.font = 'bold 9.5px "DM Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    chart.data.datasets.forEach((ds,di) => {
      const meta = chart.getDatasetMeta(di);
      meta.data.forEach((bar,bi) => {
        const val = ds.data[bi];
        if (!val || val < 1) return;
        const pct = Math.round(val / totales[bi] * 100);
        if (pct < 7) return;
        const h = bar.height || 0;
        if (h < 14) return;
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fillText(pct+'%', bar.x, bar.y + h/2);
      });
    });
    ctx.restore();
  }
};

Chart.register(hBarLabelPlugin, stackPctPlugin);

// ── Chart builders ────────────────────────────────────────────
const axY = (dark=true) => ({ grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'#7A7F94',font:{size:10},callback:v=>fmtK(v)} });
const axX = () => ({ grid:{display:false}, ticks:{color:'#7A7F94',font:{size:11}} });
const axXg = () => ({ grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'#7A7F94',font:{size:10},callback:v=>fmtK(v)} });
const axYh = () => ({ grid:{display:false}, ticks:{color:'#7A7F94',font:{size:11}} });

function buildLine(id, byDay, color) {
  const fechas = Object.keys(byDay).sort();
  const vals   = fechas.map(f=>byDay[f]);
  const prom   = vals.reduce((a,b)=>a+b,0)/vals.length;
  new Chart(document.getElementById(id), {
    type:'line',
    data:{labels:fechas.map(makeLabel), datasets:[
      {label:'Ventas',data:vals,borderColor:color,backgroundColor:color+'22',borderWidth:2,pointRadius:3,pointHoverRadius:5,fill:true,tension:0.35},
      {label:'Promedio',data:Array(vals.length).fill(Math.round(prom)),borderColor:'rgba(122,127,148,0.4)',borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.parsed.y)}}},
      scales:{x:{...axX(),ticks:{color:'#7A7F94',font:{size:10},maxRotation:45}},y:axY()}}
  });
}

function buildHBar(id, vendedores, colors) {
  const h = Math.max(180, vendedores.length*36+60);
  document.getElementById(id).parentElement.style.height = h+'px';
  new Chart(document.getElementById(id), {
    type:'bar',
    data:{labels:vendedores.map(v=>v[0]), datasets:[{data:vendedores.map(v=>v[1]),backgroundColor:colors,borderRadius:4,barPercentage:.7}]},
    options:{_hbar:true,indexAxis:'y',responsive:true,maintainAspectRatio:false,
      layout:{padding:{right:180}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.parsed.x)}}},
      scales:{x:axXg(),y:axYh()}}
  });
}

function buildStacked(id, legId, diasData, vendedores, colors) {
  const fechas   = Object.keys(diasData).sort();
  const labels   = fechas.map(makeLabel);
  const totales  = fechas.map(f=>Object.values(diasData[f]).reduce((a,b)=>a+b,0));
  const activeV  = vendedores.filter(v=>fechas.some(f=>diasData[f][v]>0));
  const datasets = activeV.map(v => {
    const ci = vendedores.indexOf(v);
    return {label:v, data:fechas.map(f=>diasData[f][v]||0), backgroundColor:colors[ci]||'#555', borderRadius:2};
  });
  const legEl = document.getElementById(legId);
  if (legEl) legEl.innerHTML = activeV.map(v=>{
    const ci = vendedores.indexOf(v);
    return `<span><span class="legend-sq" style="background:${colors[ci]||'#555'};"></span>${v}</span>`;
  }).join('');
  const h = Math.max(160, fechas.length > 5 ? 220 : 180);
  document.getElementById(id).parentElement.style.height = h+'px';
  new Chart(document.getElementById(id), {
    type:'bar', data:{labels,datasets},
    options:{_stacked:true,_totales:totales,responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const v=ctx.parsed.y;if(!v)return null;const t=totales[ctx.dataIndex];return `${ctx.dataset.label}: ${fmt(v)} (${(v/t*100).toFixed(1)}%)`;}} }},
      scales:{x:{stacked:true,...axX()},y:{stacked:true,...axY(),beginAtZero:true}}}
  });
}

// ── Highlights por categoría ──────────────────────────────────
function getHighlights(cat, d, totalEmpresa) {
  const pct = (d.total/totalEmpresa*100).toFixed(1);
  const top = d.vendedores[0];
  const topPct = top ? (top[1]/d.total*100).toFixed(1) : 0;
  const sems = Object.entries(d.bySem).map(([w,s])=>[w,Object.values(s.dias).flat().reduce((a,b)=>a+Object.values(b).reduce((x,y)=>x+y,0),0)]);
  // semana con más ventas
  const byS = {};
  d.rows.forEach(r=>{if(!r.FECHA)return;const iw=getISOWeek(new Date(r.FECHA+'T12:00:00'));byS[iw]=(byS[iw]||0)+(+r.NETO||0);});
  const mejorSem = Object.entries(byS).sort((a,b)=>b[1]-a[1])[0];
  const mejorDtLabel = d.mejorDia ? makeLabel(d.mejorDia) : '';
  return [
    top ? `<strong>${top[0]}</strong> lidera con ${fmt(top[1])} — ${topPct}% de ${cat}.` : '',
    mejorSem ? `<strong>Semana ISO ${mejorSem[0]}</strong> fue la más fuerte con ${fmt(mejorSem[1])}.` : '',
    d.mejorDia ? `<strong>${mejorDtLabel}</strong> fue el mejor día: ${fmt(d.mejorDiaVal)}.` : '',
    `Ticket promedio <strong>${fmt(d.ticket)}</strong> · ${d.diasActivos} días activos.`,
  ].filter(Boolean);
}

// ── Render ────────────────────────────────────────────────────
function render(data, periodo) {
  const app = document.getElementById('app');
  const cats = ['Mayor','Detal','Taller','AutoParts'];
  const totalEmpresa = cats.reduce((s,c)=>s+(data[c]?.total||0),0);

  // Update header
  document.getElementById('lastUpdate').innerHTML = `Datos al ${new Date().toLocaleDateString('es-VE')}<br>Total empresa: ${fmtD(totalEmpresa + data._excluidos.gerencia + data._excluidos.otros)}`;

  let html = `
    <div class="sec-title">Resumen global — ${periodo}</div>
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">Total facturado</div><div class="metric-value">${fmtK(totalEmpresa)}</div><div class="metric-sub">excl. gerencia y empleados</div></div>
      ${cats.map(c=>`<div class="metric"><div class="metric-label">${c}</div><div class="metric-value" style="color:var(--${c.toLowerCase().replace('autoparts','autoparts')})">${fmtK(data[c]?.total||0)}</div><div class="metric-sub">${((data[c]?.total||0)/totalEmpresa*100).toFixed(1)}%</div></div>`).join('')}
    </div>
    <div class="tab-bar">
      ${cats.map((c,i)=>`<button class="tab${i===0?' active':''}" onclick="switchTab('${c}',this)">${c}</button>`).join('')}
    </div>
  `;

  // Panels per category
  cats.forEach((cat,ci) => {
    const d = data[cat];
    if (!d) return;
    const C = CAT_COLORS[cat];
    const lineId=nid(), vendId=nid();
    const semIds={}, legIds={};
    Object.keys(d.bySem).forEach(w=>{ semIds[w]=nid(); legIds[w]=nid(); });
    const highlights = getHighlights(cat, d, totalEmpresa);
    const pct = (d.total/totalEmpresa*100).toFixed(1);
    const vendNames = d.vendedores.map(v=>v[0]);

    let semHtml = '';
    const isoWeeks = Object.keys(d.bySem).sort((a,b)=>+a-+b);
    // detect year from data
    const sampleDate = d.rows.find(r=>r.FECHA)?.FECHA || '';
    const year = sampleDate ? parseInt(sampleDate.slice(0,4)) : new Date().getFullYear();

    isoWeeks.forEach((w,wi) => {
      const sem = d.bySem[w];
      const semTotal = Object.values(sem.dias).reduce((s,vds)=>s+Object.values(vds).reduce((a,b)=>a+b,0),0);
      const rango = semRango(+w, year);
      semHtml += `
        <div class="sem-header">
          <span class="sem-label">Semana ${wi+1}</span>
          <span class="sem-rango">${rango}</span>
          <span class="sem-tot" style="color:${C.main};">${fmtD(semTotal)}</span>
        </div>
        <div class="legend" id="${legIds[w]}"></div>
        <div style="position:relative;width:100%;margin-bottom:1.25rem;"><canvas id="${semIds[w]}"></canvas></div>`;
    });

    html += `
    <div class="tab-panel${ci===0?' active':''}" id="panel-${cat}">
      <div class="cat-header">
        <div class="cat-dot" style="background:${C.main};"></div>
        <span class="cat-name">${cat}</span>
        <span class="cat-pct">${fmtD(d.total)} · ${pct}% del total</span>
      </div>
      <div class="metric-grid">
        <div class="metric"><div class="metric-label">Total</div><div class="metric-value">${fmtK(d.total)}</div></div>
        <div class="metric"><div class="metric-label">Facturas</div><div class="metric-value">${d.facturas.toLocaleString()}</div></div>
        <div class="metric"><div class="metric-label">Clientes</div><div class="metric-value">${d.clientes.toLocaleString()}</div></div>
        <div class="metric"><div class="metric-label">Ticket prom.</div><div class="metric-value">${fmt(d.ticket)}</div></div>

      </div>

      <div class="sec-title" style="margin-top:1.5rem;">Evolución diaria</div>
      <div style="position:relative;width:100%;height:210px;"><canvas id="${lineId}"></canvas></div>

  html += `<p class="note">Excluidos del total — Gerencia: ${fmtD(data._excluidos.gerencia)} · Garantías + Empleados: ${fmtD(data._excluidos.otros)}</p>`;

  app.innerHTML = html;

  requestAnimationFrame(() => {
    cats.forEach(cat => {
      const d = data[cat];
      if (!d) return;
      const C = CAT_COLORS[cat];
      // We need to re-find IDs — use data-attributes set via globals
      // Charts were assigned IDs in order; re-traverse
    });
  });

  // Store chart build functions and IDs, then build
  const buildQueue = [];
  cats.forEach((cat,ci) => {
    const d = data[cat];
    if (!d) return;
    const C = CAT_COLORS[cat];
    // IDs assigned sequentially — rebuild mapping
    const panel = document.getElementById('panel-'+cat);
    const canvases = panel.querySelectorAll('canvas');
    let idx = 0;
    const lineCanvas  = canvases[idx++];
    const vendCanvas  = canvases[idx++];
    const isoWeeks = Object.keys(d.bySem).sort((a,b)=>+a-+b);
    const vendNames = d.vendedores.map(v=>v[0]);
    const sampleDate = d.rows.find(r=>r.FECHA)?.FECHA || '';
    const year = sampleDate ? parseInt(sampleDate.slice(0,4)) : new Date().getFullYear();

    buildQueue.push(() => {
      buildLine(lineCanvas.id, d.byDay, C.main);
      buildHBar(vendCanvas.id, d.vendedores, C.shades.slice(0, d.vendedores.length));
      isoWeeks.forEach((w,wi) => {
        const stackCanvas = canvases[idx++];
        const legEl = stackCanvas.parentElement.previousElementSibling;

        const fechas = Object.keys(d.bySem[w].dias).sort();
        buildStacked(stackCanvas.id, legEl.id, d.bySem[w].dias, vendNames, C.shades);

  requestAnimationFrame(() => buildQueue.forEach(fn => fn()));
}

function switchTab(cat, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+cat).classList.add('active');
}

// ── Detect period from data ───────────────────────────────────
function detectPeriodo(rows) {
  const fechas = rows.map(r=>r.FECHA).filter(Boolean).sort();
  if (!fechas.length) return 'período';
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const f0 = new Date(fechas[0]+'T12:00:00');
  const f1 = new Date(fechas[fechas.length-1]+'T12:00:00');
  if (f0.getMonth()===f1.getMonth()) return `${meses[f0.getMonth()]} ${f0.getFullYear()}`;
  return `${meses[f0.getMonth()]}–${meses[f1.getMonth()]} ${f0.getFullYear()}`;
}

// ── Load & boot ───────────────────────────────────────────────
async function boot() {
  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    const text = await resp.text();
    const rows = parseCSV(text);
    if (!rows.length) throw new Error('Sin datos');
    const data    = aggregate(rows);
    const periodo = detectPeriodo(rows);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render(data, periodo);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Error al cargar: ' + e.message;
  }
}

boot();
