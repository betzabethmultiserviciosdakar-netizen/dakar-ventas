<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Ventas — Multiservicios Dakar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #F5F6FA;
    --bg2:     #FFFFFF;
    --bg3:     #EEF0F6;
    --border:  #DDE1ED;
    --text:    #1A1D2E;
    --muted:   #6B7080;
    --mayor:   #1D4ED8;
    --detal:   #047857;
    --taller:  #B45309;
    --autoparts:#6D28D9;
    --danger:  #DC2626;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;}
  .shell{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}

  /* Header */
  .page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:2px solid var(--border);}
  .page-title{font-size:24px;font-weight:700;color:var(--text);}
  .page-sub{font-size:13px;color:var(--muted);margin-top:3px;}
  .last-update{font-size:12px;color:var(--muted);text-align:right;line-height:1.7;}

  /* Loading */
  #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--mayor);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #loading p{color:var(--muted);font-size:13px;}
  #error-msg{display:none;text-align:center;padding:4rem 2rem;color:var(--danger);}

  /* Metrics */
  .metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem;}
  .metric{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;}
  .metric-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
  .metric-value{font-size:22px;font-weight:700;color:var(--text);}
  .metric-sub{font-size:11px;color:var(--muted);margin-top:3px;}

  /* Section */
  .sec-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:1.75rem 0 .75rem;}
  .divider{border:none;border-top:1px solid var(--border);margin:2.5rem 0;}

  /* Cat header */
  .cat-header{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.85rem 1.1rem;margin-bottom:1rem;}
  .cat-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
  .cat-name{font-size:16px;font-weight:700;}
  .cat-pct{font-size:13px;color:var(--muted);margin-left:auto;}

  /* Highlights */
  .highlight{display:flex;gap:10px;align-items:flex-start;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;margin-bottom:6px;}
  .hl-dot{width:7px;height:7px;border-radius:50%;margin-top:6px;flex-shrink:0;}
  .hl-text{font-size:13px;color:var(--muted);line-height:1.6;}
  .hl-text strong{color:var(--text);font-weight:600;}

  /* Tooltip box */
  .tooltip-def{font-size:11px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.4rem .75rem;margin-bottom:.75rem;display:inline-block;}

  /* Charts */
  .chart-wrap{position:relative;width:100%;}

  /* Semana */
  .sem-block{margin-bottom:2rem;}
  .sem-header{display:flex;align-items:baseline;gap:10px;padding:.6rem 1rem;background:var(--bg3);border-radius:8px;margin-bottom:.6rem;}
  .sem-label{font-size:13px;font-weight:700;}
  .sem-rango{font-size:12px;color:var(--muted);}
  .sem-tot{margin-left:auto;font-size:13px;font-weight:700;}

  /* Legend */
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;}
  .legend span{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
  .legend-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

  /* Tabs */
  .tab-bar{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:1.5rem;}
  .tab{font-size:13px;font-weight:500;padding:8px 18px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--text);font-weight:700;border-bottom-color:var(--text);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  /* Note */
  .note{font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:1rem;margin-top:2.5rem;}

  @media(max-width:600px){
    .metric-grid{grid-template-columns:repeat(2,1fr);}
    .page-header{flex-direction:column;gap:.75rem;align-items:flex-start;}
  }
</style>
</head>
<body>
<div class="shell">

  <div class="page-header">
    <div>
      <div class="page-title">Reporte de Ventas</div>
      <div class="page-sub">Multiservicios Dakar C.A.</div>
    </div>
    <div class="last-update" id="lastUpdate">Cargando...</div>
  </div>

  <div id="loading"><div class="spinner"></div><p>Cargando datos...</p></div>
  <div id="error-msg"></div>
  <div id="app" style="display:none;"></div>

</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTviotp9xDd9eB-4YVMbNKL-ERVbaB95dyTIptF1QsNzRYLksncPkoXn7o-1Lt2qfCQJJeKSF_hDBxU/pub?gid=1852453384&single=true&output=csv';

const CAT_COLORS = {
  Mayor:    {main:'#1D4ED8', shades:['#1E3A8A','#1D4ED8','#2563EB','#3B82F6','#60A5FA','#93C5FD','#BFDBFE','#0C2461','#153380','#1A4098','#2050B8','#2D60CC','#3D72D8','#5085E0']},
  Detal:    {main:'#047857', shades:['#064E3B','#065F46','#047857','#059669','#10B981','#34D399','#6EE7B7','#A7F3D0','#D1FAE5']},
  Taller:   {main:'#B45309', shades:['#78350F','#B45309']},
  AutoParts:{main:'#6D28D9', shades:['#4C1D95','#5B21B6','#6D28D9']},
};

// ── Number parser ─────────────────────────────────────────────
// Google Sheets CSV puede exportar: "1,020.11" (miles con coma, decimal con punto)
function parseNum(s) {
  if (s === null || s === undefined || s === '') return 0;
  if (typeof s === 'number') return s;
  s = String(s).trim();
  // Formato "1,234.56" — coma=miles, punto=decimal
  if (s.indexOf(',') > -1 && s.indexOf('.') > -1) {
    s = s.replace(/,/g, ''); // quitar separadores de miles
  } else if (s.indexOf(',') > -1 && s.indexOf('.') === -1) {
    // Solo coma → decimal europeo "265,68"
    s = s.replace(',', '.');
  }
  // Si solo tiene punto → ya está bien "265.68"
  return parseFloat(s) || 0;
}

const fmt  = v => '$' + parseNum(v).toLocaleString('es-VE', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtK = v => { const n=parseNum(v); return n>=1e6?'$'+(n/1e6).toFixed(2)+'M':n>=1000?'$'+(n/1000).toFixed(0)+'K':'$'+Math.round(n); };
const diasEs = {'Mon':'Lun','Tue':'Mar','Wed':'Mié','Thu':'Jue','Fri':'Vie','Sat':'Sáb','Sun':'Dom'};
const makeLabel = f => { const dt=new Date(f+'T12:00:00'); return (diasEs[dt.toLocaleDateString('en-US',{weekday:'short'}).slice(0,3)]||'?')+' '+dt.getDate(); };

// ── CSV parser ────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
  return lines.slice(1).map(line => {
    const cols=[]; let cur='', inQ=false;
    for (let i=0;i<line.length;i++) {
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
      else cur+=c;
    }
    cols.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=cols[i]||'');
    return obj;
  }).filter(r=>r.ARTICULO&&r.ARTICULO!=='ARTICULO');
}

// ── ISO week ──────────────────────────────────────────────────
function getISOWeek(dt) {
  const d=new Date(dt); d.setHours(12,0,0,0);
  d.setDate(d.getDate()+4-(d.getDay()||7));
  const ys=new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-ys)/86400000)+1)/7);
}

function semRango(isoWeek, year) {
  const jan1=new Date(year,0,1);
  const daysToMonday = (8-(jan1.getDay()||7))%7;
  const firstMonday=new Date(year,0,1+daysToMonday);
  const lunes=new Date(firstMonday); lunes.setDate(firstMonday.getDate()+(isoWeek-1)*7);
  const sabado=new Date(lunes); sabado.setDate(lunes.getDate()+5);
  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${lunes.getDate()} ${meses[lunes.getMonth()]} – ${sabado.getDate()} ${meses[sabado.getMonth()]}`;
}

// ── Aggregate ─────────────────────────────────────────────────
function aggregate(rows) {
  const cats=['Mayor','Detal','Taller','AutoParts'];
  const result={};

  cats.forEach(cat=>{
    const data=rows.filter(r=>r.CATEGORIA===cat);
    const total=data.reduce((s,r)=>s+parseNum(r.NETO),0);
    const factSet=new Set(data.map(r=>r.FACTURA));
    const cliSet=new Set(data.map(r=>r.CLIENTE));
    const ticket=factSet.size?total/factSet.size:0;

    const byVend={};
    data.forEach(r=>{byVend[r.NOMBRE]=(byVend[r.NOMBRE]||0)+parseNum(r.NETO);});
    const vendedores=Object.entries(byVend).sort((a,b)=>b[1]-a[1]);

    const byDay={};
    data.forEach(r=>{if(r.FECHA)byDay[r.FECHA]=(byDay[r.FECHA]||0)+parseNum(r.NETO);});

    const bySem={};
    data.forEach(r=>{
      if(!r.FECHA)return;
      const dt=new Date(r.FECHA+'T12:00:00');
      const iw=getISOWeek(dt);
      if(!bySem[iw])bySem[iw]={dias:{}};
      if(!bySem[iw].dias[r.FECHA])bySem[iw].dias[r.FECHA]={};
      bySem[iw].dias[r.FECHA][r.NOMBRE]=(bySem[iw].dias[r.FECHA][r.NOMBRE]||0)+parseNum(r.NETO);
    });

    const daysSorted=Object.entries(byDay).sort((a,b)=>b[1]-a[1]);
    result[cat]={total,facturas:factSet.size,clientes:cliSet.size,ticket,vendedores,byDay,bySem,
      mejorDia:daysSorted[0]?.[0]||'',mejorDiaVal:daysSorted[0]?.[1]||0,
      diasActivos:Object.keys(byDay).length,rows:data};
  });

  result._excluidos={
    gerencia:rows.filter(r=>r.NOMBRE==='Gerencia').reduce((s,r)=>s+parseNum(r.NETO),0),
    otros:rows.filter(r=>['Empleados','Garantias'].includes(r.NOMBRE)).reduce((s,r)=>s+parseNum(r.NETO),0),
  };
  return result;
}

// ── Plugins ───────────────────────────────────────────────────
const hBarLabel={id:'hBarLabel',afterDatasetsDraw(chart){
  if(!chart.config.options._hbar)return;
  const{ctx,data}=chart;
  const total=data.datasets[0].data.reduce((a,b)=>a+b,0);
  const meta=chart.getDatasetMeta(0);
  ctx.save();ctx.font='500 11px Inter,sans-serif';ctx.fillStyle='#6B7080';ctx.textAlign='left';ctx.textBaseline='middle';
  meta.data.forEach((bar,i)=>{
    const val=data.datasets[0].data[i];
    const pct=(val/total*100).toFixed(1);
    ctx.fillText(`${fmt(val)}   ${pct}%`,bar.x+8,bar.y);
  });
  ctx.restore();
}};

const stackPct={id:'stackPct',afterDatasetsDraw(chart){
  if(!chart.config.options._stacked)return;
  const{ctx}=chart; const totales=chart.config.options._totales;
  ctx.save();ctx.font='bold 10px Inter,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  chart.data.datasets.forEach((ds,di)=>{
    const meta=chart.getDatasetMeta(di);
    meta.data.forEach((bar,bi)=>{
      const val=ds.data[bi]; if(!val||val<1)return;
      const pct=Math.round(val/totales[bi]*100); if(pct<7)return;
      const h=bar.height||0; if(h<14)return;
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.fillText(pct+'%',bar.x,bar.y+h/2);
    });
  });
  ctx.restore();
}};

Chart.register(hBarLabel,stackPct);

// ── Chart helpers ─────────────────────────────────────────────
const gAxY=()=>({grid:{color:'rgba(0,0,0,0.06)'},ticks:{color:'#6B7080',font:{size:11},callback:v=>fmtK(v)}});
const gAxX=()=>({grid:{display:false},ticks:{color:'#6B7080',font:{size:12}}});
const gAxXg=()=>({grid:{color:'rgba(0,0,0,0.06)'},ticks:{color:'#6B7080',font:{size:11},callback:v=>fmtK(v)}});
const gAxYh=()=>({grid:{display:false},ticks:{color:'#1A1D2E',font:{size:12},padding:4}});

function buildLine(id,byDay,color){
  const fechas=Object.keys(byDay).sort();
  const vals=fechas.map(f=>byDay[f]);
  const prom=vals.reduce((a,b)=>a+b,0)/vals.length;
  new Chart(document.getElementById(id),{type:'line',
    data:{labels:fechas.map(makeLabel),datasets:[
      {label:'Ventas',data:vals,borderColor:color,backgroundColor:color+'18',borderWidth:2.5,pointRadius:3,pointHoverRadius:6,fill:true,tension:0.35},
      {label:'Promedio',data:Array(vals.length).fill(Math.round(prom)),borderColor:'rgba(107,112,128,0.4)',borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.parsed.y)}}},
      scales:{x:{...gAxX(),ticks:{color:'#6B7080',font:{size:11},maxRotation:45}},y:gAxY()}}
  });
}

function buildHBar(id,vendedores,colors){
  const h=Math.max(200,vendedores.length*38+70);
  document.getElementById(id).parentElement.style.height=h+'px';
  new Chart(document.getElementById(id),{type:'bar',
    data:{labels:vendedores.map(v=>v[0]),datasets:[{data:vendedores.map(v=>v[1]),backgroundColor:colors,borderRadius:5,barPercentage:.75}]},
    options:{_hbar:true,indexAxis:'y',responsive:true,maintainAspectRatio:false,
      layout:{padding:{right:200}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.parsed.x)}}},
      scales:{x:gAxXg(),y:gAxYh()}}
  });
}

function buildStacked(id,legId,diasData,vendedores,colors){
  const fechas=Object.keys(diasData).sort();
  const labels=fechas.map(makeLabel);
  const totales=fechas.map(f=>Object.values(diasData[f]).reduce((a,b)=>a+b,0));
  const activeV=vendedores.filter(v=>fechas.some(f=>diasData[f][v]>0));
  const datasets=activeV.map(v=>{
    const ci=vendedores.indexOf(v);
    return{label:v,data:fechas.map(f=>diasData[f][v]||0),backgroundColor:colors[ci]||'#999',borderRadius:2};
  });
  const legEl=document.getElementById(legId);
  if(legEl)legEl.innerHTML=activeV.map(v=>{
    const ci=vendedores.indexOf(v);
    return`<span><span class="legend-sq" style="background:${colors[ci]||'#999'};"></span>${v}</span>`;
  }).join('');
  const h=Math.max(180,fechas.length>5?240:200);
  document.getElementById(id).parentElement.style.height=h+'px';
  new Chart(document.getElementById(id),{type:'bar',data:{labels,datasets},
    options:{_stacked:true,_totales:totales,responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const v=ctx.parsed.y;if(!v)return null;const t=totales[ctx.dataIndex];return`${ctx.dataset.label}: ${fmt(v)} (${(v/t*100).toFixed(1)}%)`;}}}},
      scales:{x:{stacked:true,...gAxX()},y:{stacked:true,...gAxY(),beginAtZero:true}}}
  });
}

// ── Detect period ─────────────────────────────────────────────
function detectPeriodo(rows){
  const fechas=rows.map(r=>r.FECHA).filter(Boolean).sort();
  if(!fechas.length)return'período';
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const f0=new Date(fechas[0]+'T12:00:00');
  const f1=new Date(fechas[fechas.length-1]+'T12:00:00');
  return f0.getMonth()===f1.getMonth()?`${meses[f0.getMonth()]} ${f0.getFullYear()}`:`${meses[f0.getMonth()]}–${meses[f1.getMonth()]} ${f0.getFullYear()}`;
}

// ── Render ────────────────────────────────────────────────────
function render(data,periodo){
  const app=document.getElementById('app');
  const cats=['Mayor','Detal','Taller','AutoParts'];
  const totalEmpresa=cats.reduce((s,c)=>s+(data[c]?.total||0),0);
  const totalConExcl=totalEmpresa+(data._excluidos.gerencia||0)+(data._excluidos.otros||0);

  document.getElementById('lastUpdate').innerHTML=
    `Datos al ${new Date().toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit',year:'numeric'})}<br>
     <strong>Total empresa: ${fmt(totalConExcl)}</strong>`;

  let html=`
    <div class="sec-title">Resumen global — ${periodo}</div>
    <div class="metric-grid">
      <div class="metric">
        <div class="metric-label">Total facturado</div>
        <div class="metric-value">${fmt(totalEmpresa)}</div>
        <div class="metric-sub">Excluye gerencia y compras de empleados</div>
      </div>
      ${cats.map(c=>{
        const pct=((data[c]?.total||0)/totalEmpresa*100).toFixed(1);
        const colorVar=c==='AutoParts'?'autoparts':c.toLowerCase();
        return`<div class="metric">
          <div class="metric-label">${c}</div>
          <div class="metric-value" style="color:var(--${colorVar})">${fmt(data[c]?.total||0)}</div>
          <div class="metric-sub">${pct}% del total</div>
        </div>`;
      }).join('')}
    </div>
    <div class="tab-bar">
      ${cats.map((c,i)=>`<button class="tab${i===0?' active':''}" onclick="switchTab('${c}',this)">${c}</button>`).join('')}
    </div>`;

  // Panels
  cats.forEach((cat,ci)=>{
    const d=data[cat]; if(!d)return;
    const C=CAT_COLORS[cat];
    const pct=((d.total/totalEmpresa)*100).toFixed(1);
    const vendNames=d.vendedores.map(v=>v[0]);
    const sampleDate=d.rows.find(r=>r.FECHA)?.FECHA||'';
    const year=sampleDate?parseInt(sampleDate.slice(0,4)):new Date().getFullYear();
    const isoWeeks=Object.keys(d.bySem).sort((a,b)=>+a-+b);

    // IDs
    const lineId='line_'+cat;
    const vendId='vend_'+cat;

    // Semanas html
    let semHtml='';
    isoWeeks.forEach((w,wi)=>{
      const sem=d.bySem[w];
      const semTotal=Object.values(sem.dias).reduce((s,vds)=>s+Object.values(vds).reduce((a,b)=>a+b,0),0);
      const rango=semRango(+w,year);
      const sid=`stk_${cat}_${w}`;
      const lid=`leg_${cat}_${w}`;
      semHtml+=`
        <div class="sem-block">
          <div class="sem-header">
            <span class="sem-label">Semana ${wi+1}</span>
            <span class="sem-rango">${rango}</span>
            <span class="sem-tot" style="color:${C.main};">${fmt(semTotal)}</span>
          </div>
          <div class="legend" id="${lid}"></div>
          <div style="position:relative;width:100%;"><canvas id="${sid}"></canvas></div>
        </div>`;
    });

    html+=`
    <div class="tab-panel${ci===0?' active':''}" id="panel-${cat}">
      <div class="cat-header">
        <div class="cat-dot" style="background:${C.main};"></div>
        <span class="cat-name">${cat}</span>
        <span class="cat-pct">${fmt(d.total)} · ${pct}% del total</span>
      </div>
      <div class="metric-grid">
        <div class="metric"><div class="metric-label">Total</div><div class="metric-value">${fmt(d.total)}</div></div>
        <div class="metric"><div class="metric-label">Facturas</div><div class="metric-value">${d.facturas.toLocaleString('es-VE')}</div></div>
        <div class="metric"><div class="metric-label">Clientes</div><div class="metric-value">${d.clientes.toLocaleString('es-VE')}</div></div>
        <div class="metric">
          <div class="metric-label">Monto promedio por factura</div>
          <div class="metric-value">${fmt(d.ticket)}</div>
          <div class="metric-sub">Total ÷ número de facturas</div>
        </div>
        <div class="metric"><div class="metric-label">Promedio diario</div><div class="metric-value">${fmt(d.total/(d.diasActivos||1))}</div></div>
        <div class="metric">
          <div class="metric-label">Mejor día</div>
          <div class="metric-value">${fmt(d.mejorDiaVal)}</div>
          <div class="metric-sub">${d.mejorDia?makeLabel(d.mejorDia):''}</div>
        </div>
      </div>

      <div class="sec-title">Evolución diaria</div>
      <div style="position:relative;width:100%;height:220px;"><canvas id="${lineId}"></canvas></div>

      <div class="sec-title">Por vendedor — total del período</div>
      <div style="position:relative;width:100%;height:200px;"><canvas id="${vendId}"></canvas></div>

      <div class="sec-title">Desglose semanal — contribución por vendedor cada día</div>
      ${semHtml}
    </div>`;
  });

  html+=`<p class="note">Excluidos del total principal — Gerencia: ${fmt(data._excluidos.gerencia)} · Garantías y compras de empleados: ${fmt(data._excluidos.otros)}</p>`;

  app.innerHTML=html;

  // Build all charts
  requestAnimationFrame(()=>{
    cats.forEach(cat=>{
      const d=data[cat]; if(!d)return;
      const C=CAT_COLORS[cat];
      const vendNames=d.vendedores.map(v=>v[0]);
      const sampleDate=d.rows.find(r=>r.FECHA)?.FECHA||'';
      const year=sampleDate?parseInt(sampleDate.slice(0,4)):new Date().getFullYear();
      const isoWeeks=Object.keys(d.bySem).sort((a,b)=>+a-+b);

      buildLine('line_'+cat, d.byDay, C.main);
      buildHBar('vend_'+cat, d.vendedores, C.shades.slice(0,d.vendedores.length));
      isoWeeks.forEach(w=>{
        buildStacked(`stk_${cat}_${w}`,`leg_${cat}_${w}`,d.bySem[w].dias,vendNames,C.shades);
      });
    });
  });
}

function switchTab(cat,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+cat).classList.add('active');
}

// ── Boot ──────────────────────────────────────────────────────
async function boot(){
  try{
    const resp=await fetch(CSV_URL);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const text=await resp.text();
    const rows=parseCSV(text);
    if(!rows.length)throw new Error('Sin datos');
    const data=aggregate(rows);
    const periodo=detectPeriodo(rows);
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    render(data,periodo);
  }catch(e){
    document.getElementById('loading').style.display='none';
    const el=document.getElementById('error-msg');
    el.style.display='block';
    el.style.color='#DC2626';
    el.style.padding='3rem';
    el.style.textAlign='center';
    el.textContent='Error al cargar el reporte: '+e.message;
  }
}
boot();
</script>
